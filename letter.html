<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transmisi — Nebula Diary</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Unique layout: full-bleed hero with gradient floor */
      .transmission-hero {
        position: relative;
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 6rem 1rem 3rem;
        background:
          radial-gradient(
            ellipse at 50% 30%,
            rgba(123, 47, 190, 0.3),
            transparent 60%
          ),
          radial-gradient(
            ellipse at 80% 80%,
            rgba(240, 171, 252, 0.08),
            transparent 50%
          );
      }

      .tx-badge {
        font-family: var(--f-body, sans-serif);
        font-size: 0.75rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--lavender, #c084fc);
        margin-bottom: 1rem;
        display: block;
      }

      .tx-hero-title {
        font-family: var(--f-body, sans-serif);
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 300;
        margin: 0;
        opacity: 0.8;
      }

      .tx-hero-name {
        font-family: var(--f-script, cursive, serif);
        font-size: clamp(3.5rem, 10vw, 6rem);
        line-height: 1.1;
        margin: 0.5rem 0;
        color: #fff;
        text-shadow: 0 0 25px rgba(192, 132, 252, 0.5);
      }

      .tx-hero-sub {
        font-size: clamp(0.9rem, 2vw, 1.1rem);
        max-width: 400px;
        margin: 0.5rem auto 1.5rem;
        opacity: 0.7;
        line-height: 1.6;
      }

      /* Radio wave visual */
      .radio-waves {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 30px;
        margin: 1rem 0;
      }
      .radio-bar {
        width: 3px;
        height: 10px;
        background: var(--lavender, #c084fc);
        border-radius: 3px;
        animation: pulseWave 1.2s infinite ease-in-out;
      }
      .radio-bar:nth-child(2) {
        animation-delay: 0.1s;
        height: 18px;
      }
      .radio-bar:nth-child(3) {
        animation-delay: 0.2s;
        height: 26px;
      }
      .radio-bar:nth-child(4) {
        animation-delay: 0.3s;
        height: 14px;
      }
      .radio-bar:nth-child(5) {
        animation-delay: 0.4s;
        height: 22px;
      }
      .radio-bar:nth-child(6) {
        animation-delay: 0.5s;
        height: 16px;
      }
      .radio-bar:nth-child(7) {
        animation-delay: 0.6s;
        height: 10px;
      }

      @keyframes pulseWave {
        0%,
        100% {
          transform: scaleY(0.6);
          opacity: 0.5;
        }
        50% {
          transform: scaleY(1.3);
          opacity: 1;
        }
      }

      /* Letter Panel Layout Constraints */
      .letter-panel-wrap {
        position: relative;
        max-width: 800px;
        margin: 0 auto;
        padding: 0 1.5rem;
        overflow-x: clip; /* Prevents floating photos from causing horizontal scroll */
      }

      .letter-panel {
        background: rgba(18, 8, 36, 0.75);
        border: 1px solid rgba(192, 132, 252, 0.2);
        border-radius: 16px;
        padding: clamp(2rem, 5vw, 4rem);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        margin-top: 1rem;
      }

      .letter-from {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.5;
        margin-bottom: 2rem;
        border-bottom: 1px dashed rgba(192, 132, 252, 0.2);
        padding-bottom: 0.8rem;
      }

      .letter-to {
        font-family: var(--f-script, cursive, serif);
        font-size: 2rem;
        color: var(--lavender, #c084fc);
        display: block;
        margin-bottom: 1rem;
      }

      .letter-body {
        font-size: clamp(0.95rem, 2vw, 1.1rem);
        line-height: 1.8;
        white-space: pre-wrap;
        min-height: 150px;
      }

      .letter-sign {
        display: block;
        margin-top: 3rem;
        font-family: var(--f-script, cursive, serif);
        font-size: 1.8rem;
        color: var(--lavender, #c084fc);
        opacity: 0;
        transition: opacity 1s ease;
      }
      .letter-sign.show {
        opacity: 1;
      }

      /* Floating photo beside letter */
      .letter-photo-float {
        position: absolute;
        right: -25px;
        top: 40%;
        transform: translateY(-50%) rotate(3deg);
        width: 130px;
        background: rgba(27, 10, 61, 0.9);
        border: 1px solid rgba(192, 132, 252, 0.3);
        padding: 6px 6px 28px;
        border-radius: 6px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        transition: transform 0.3s;
        z-index: 10;
      }
      .letter-photo-float:hover {
        transform: translateY(-50%) rotate(0deg) scale(1.05);
      }
      .letter-photo-float img {
        width: 100%;
        aspect-ratio: 3/4;
        object-fit: cover;
        display: block;
        border-radius: 2px;
      }
      .letter-photo-float-caption {
        font-family: var(--f-script, cursive);
        font-size: 0.95rem;
        color: var(--lavender, #c084fc);
        text-align: center;
        margin-top: 6px;
      }

      /* Second floating photo — left side */
      .letter-photo-float-2 {
        position: absolute;
        left: -20px;
        bottom: 40px;
        transform: rotate(-4deg);
        width: 110px;
        background: rgba(27, 10, 61, 0.9);
        border: 1px solid rgba(192, 132, 252, 0.2);
        padding: 6px 6px 22px;
        border-radius: 6px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
        transition: transform 0.3s;
        z-index: 10;
      }
      .letter-photo-float-2:hover {
        transform: rotate(0deg) scale(1.05);
      }
      .letter-photo-float-2 img {
        width: 100%;
        aspect-ratio: 3/4;
        object-fit: cover;
        display: block;
        border-radius: 2px;
      }

      @media (max-width: 850px) {
        .letter-photo-float,
        .letter-photo-float-2 {
          display: none; /* Safely hide decorative overlaps on screens too small to fit them */
        }
      }

      /* Decorative constellation lines behind letter */
      .letter-bg-const {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .letter-bg-const svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0.08;
      }

      /* Mood photos grid below letter */
      .letter-mood-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        max-width: 550px;
        margin: 3.5rem auto 0;
      }
      .letter-mood-tile {
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(192, 132, 252, 0.2);
        aspect-ratio: 3/4;
        background: rgba(27, 10, 61, 0.4);
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .letter-mood-tile:hover {
        transform: scale(1.04) translateY(-4px);
        box-shadow: 0 10px 30px rgba(123, 47, 190, 0.3);
      }
      .letter-mood-tile img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: brightness(0.9) saturate(0.9);
        transition: filter 0.4s;
      }
      .letter-mood-tile:hover img {
        filter: brightness(1) saturate(1.1);
      }

      /* Transmission received label */
      .tx-received {
        font-family: var(--f-body, sans-serif);
        font-size: 0.7rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--lavender, #c084fc);
        text-align: center;
        margin: 2rem 0 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        opacity: 0.8;
      }
      .tx-received::before,
      .tx-received::after {
        content: "";
        flex: 1;
        max-width: 100px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(192, 132, 252, 0.4)
        );
      }
      .tx-received::after {
        background: linear-gradient(
          270deg,
          transparent,
          rgba(192, 132, 252, 0.4)
        );
      }

      .letter-photo,
      .letter-photo-float,
      .letter-photo-float-2,
      .letter-mood-tile {
        background: rgba(
          20,
          8,
          45,
          0.85
        ) !important; /* Deep space dark purple */
        padding: 8px 8px 32px 8px !important; /* Thick bottom border like a polaroid */
        border: 1px solid rgba(240, 171, 252, 0.3) !important; /* Soft nebula pink border */
        border-radius: 6px !important;
        box-shadow:
          0 15px 30px rgba(0, 0, 0, 0.6),
          /* Deep drop shadow */ 0 0 15px rgba(192, 132, 252, 0.3) !important; /* Purple outer space glow */
        position: relative;
        transition:
          transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
          box-shadow 0.4s !important;
      }

      .letter-photo::after,
      .letter-photo-float::after,
      .letter-photo-float-2::after,
      .letter-mood-tile::after {
        content: "✦";
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(240, 171, 252, 0.7);
        font-size: 16px;
        text-shadow: 0 0 8px rgba(240, 171, 252, 0.8);
        pointer-events: none;
      }

      .letter-photo {
        transform: rotate(-4deg);
      }
      .letter-photo.right {
        transform: rotate(5deg);
      }
      .letter-photo-float {
        transform: translateY(-50%) rotate(6deg) !important;
      }
      .letter-photo-float-2 {
        transform: rotate(-5deg) !important;
      }

      .letter-mood-grid {
        display: flex !important;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
        padding: 1rem 0;
      }
      .letter-mood-tile:nth-child(1) {
        transform: translateY(10px) rotate(-6deg);
      }
      .letter-mood-tile:nth-child(2) {
        transform: translateY(-10px) rotate(4deg);
      }
      .letter-mood-tile:nth-child(3) {
        transform: translateY(5px) rotate(-3deg);
      }

      .letter-photo:hover,
      .letter-photo-float:hover,
      .letter-photo-float-2:hover,
      .letter-mood-tile:hover {
        transform: translateY(-5px) rotate(0deg) scale(1.05) !important;
        box-shadow:
          0 25px 40px rgba(0, 0, 0, 0.7),
          0 0 30px rgba(240, 171, 252, 0.6) !important;
        z-index: 10;
      }

      .letter-photo img,
      .letter-photo-float img,
      .letter-photo-float-2 img,
      .letter-mood-tile img {
        border-radius: 2px !important;
        filter: brightness(0.9) contrast(1.1);
        transition: filter 0.4s;
      }

      .letter-photo:hover img,
      .letter-photo-float:hover img,
      .letter-photo-float-2:hover img,
      .letter-mood-tile:hover img {
        filter: brightness(1) contrast(1);
      }
    </style>
  </head>
  <body>
    <canvas id="starfield"></canvas>
    <div class="aurora-bg">
      <div class="aurora-band aurora-band-1"></div>
      <div class="aurora-band aurora-band-2"></div>
      <div class="aurora-band aurora-band-3"></div>
    </div>
    <div id="page-transition"></div>

    <a href="game.html" class="back-nav" data-nav>← mission</a>

    <div id="music-player">
      <button id="music-btn">♫</button>
      <div class="music-meta">
        <span class="music-title">Our Song</span>
        <span class="music-artist">For You</span>
      </div>
      <div class="music-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <section class="transmission-hero letter-page">
      <span class="tx-badge"
        >03 / 04 &nbsp;·&nbsp; incoming transmission &nbsp;·&nbsp;
        encrypted</span
      >

      <h1 class="tx-hero-title">Sebuah</h1>
      <div class="tx-hero-name">Surat</div>
      <p class="tx-hero-sub">
        dari hati yang butuh waktu lama untuk menemukan kata yang tepat
      </p>

      <div class="radio-waves">
        <div class="radio-bar"></div>
        <div class="radio-bar"></div>
        <div class="radio-bar"></div>
        <div class="radio-bar"></div>
        <div class="radio-bar"></div>
        <div class="radio-bar"></div>
        <div class="radio-bar"></div>
      </div>

      <div
        style="
          position: relative;
          z-index: 3;
          margin-top: 2rem;
          display: inline-block;
        "
      >
        <div
          style="
            background: rgba(27, 10, 61, 0.85);
            border: 1px solid rgba(192, 132, 252, 0.3);
            padding: 8px 8px 32px;
            border-radius: 6px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            transform: rotate(-2deg);
            display: inline-block;
            transition: transform 0.3s ease;
          "
        >
          <img
            src="asset/12.jpg"
            alt="her"
            style="
              width: 150px;
              height: 200px;
              object-fit: cover;
              display: block;
              border-radius: 2px;
            "
            onerror="this.src = 'https://picsum.photos/seed/lhero/150/200'"
          />
          <span
            style="
              font-family: var(--f-script, cursive);
              font-size: 1.1rem;
              color: var(--lavender, #c084fc);
              display: block;
              text-align: center;
              margin-top: 8px;
            "
            >kamu 💜</span
          >
        </div>
      </div>
    </section>

    <div class="letter-panel-wrap">
      <div class="tx-received reveal">transmission received</div>

      <div class="letter-panel reveal" style="position: relative">
        <div class="letter-bg-const">
          <svg viewBox="0 0 660 600" xmlns="http://www.w3.org/2000/svg">
            <line
              x1="80"
              y1="100"
              x2="220"
              y2="60"
              stroke="#C084FC"
              stroke-width="1"
            />
            <line
              x1="220"
              y1="60"
              x2="350"
              y2="130"
              stroke="#C084FC"
              stroke-width="1"
            />
            <line
              x1="350"
              y1="130"
              x2="500"
              y2="80"
              stroke="#C084FC"
              stroke-width="1"
            />
            <line
              x1="100"
              y1="300"
              x2="280"
              y2="280"
              stroke="#C084FC"
              stroke-width="1"
            />
            <line
              x1="280"
              y1="280"
              x2="400"
              y2="350"
              stroke="#C084FC"
              stroke-width="1"
            />
            <circle cx="80" cy="100" r="3" fill="#C084FC" opacity=".5" />
            <circle cx="220" cy="60" r="3" fill="#C084FC" opacity=".5" />
            <circle cx="350" cy="130" r="3" fill="#C084FC" opacity=".5" />
            <circle cx="500" cy="80" r="3" fill="#C084FC" opacity=".5" />
            <circle cx="100" cy="300" r="3" fill="#C084FC" opacity=".5" />
            <circle cx="280" cy="280" r="3" fill="#C084FC" opacity=".5" />
            <circle cx="400" cy="350" r="3" fill="#C084FC" opacity=".5" />
          </svg>
        </div>

        <div class="letter-photo-float">
          <img
            src="asset/4.jpg"
            alt="us"
            onerror="this.src = 'https://picsum.photos/seed/lf1/120/160'"
          />
          <div class="letter-photo-float-caption">kita 🌙</div>
        </div>
        <div class="letter-photo-float-2">
          <img
            src="asset/6.jpg"
            alt="us"
            onerror="this.src = 'https://picsum.photos/seed/lf2/100/133'"
          />
        </div>

        <p class="letter-from">
          transmisi dari: Jacob · kepada: Natashya · selalu
        </p>
        <span class="letter-to">Sayang,</span>

        <div class="letter-body" id="letter-output"></div>

        <span class="letter-sign" id="letter-sign">— selalu milikmu 💜</span>
      </div>

      <div class="letter-mood-grid reveal">
        <div class="letter-mood-tile">
          <img
            src="asset/2.jpg"
            alt="her"
            onerror="this.src = 'https://picsum.photos/seed/lm2/150/200'"
          />
        </div>
        <div class="letter-mood-tile">
          <img
            src="asset/5.jpg"
            alt="her"
            onerror="this.src = 'https://picsum.photos/seed/lm5/150/200'"
          />
        </div>
        <div class="letter-mood-tile">
          <img
            src="asset/13.jpg"
            alt="her"
            onerror="this.src = 'https://picsum.photos/seed/lm13/150/200'"
          />
        </div>
      </div>

      <div
        style="
          text-align: center;
          padding: 4rem 2rem 6rem;
          position: relative;
          z-index: 2;
        "
      >
        <a href="stars.html" class="gate-btn reveal" data-nav>
          <span>lihat bintang-bintangmu</span><span>→</span>
        </a>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
